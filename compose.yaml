services:
  landing:
    image: nginx:alpine
    container_name: orbitron-landing
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orbitron.rule=Host(`orbitron.pro`)"
      - "traefik.http.routers.orbitron.entrypoints=websecure"
      - "traefik.http.routers.orbitron.tls=true"
      - "traefik.http.routers.orbitron.tls.certresolver=letsencrypt"
      - "traefik.http.services.orbitron.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true
